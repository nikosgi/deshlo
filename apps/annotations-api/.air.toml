root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/server ./cmd/server"
bin = "./tmp/server"
include_ext = ["go"]
exclude_dir = ["tmp", "vendor", "node_modules", ".git"]
exclude_regex = ["_test\\.go$"]
delay = 200
stop_on_error = true
send_interrupt = true

[log]
time = true

[screen]
clear_on_rebuild = true
